<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyBoard — 学习复习助手</title>

  <!-- Google Fonts: Playfair Display -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">

  <!-- KaTeX CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js"></script>

  <!-- 应用样式 -->
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div id="app">
    <!-- ===== 侧边栏 ===== -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <h2><i data-lucide="book-open"></i> StudyBoard</h2>
        <p>学习复习助手</p>
      </div>

      <div class="course-list" id="sidebarCourseList">
        <!-- 动态渲染课程列表 -->
      </div>

      <button class="btn btn-primary" id="btnNewCourse" style="margin: 8px 12px;">
        <i data-lucide="plus"></i> 新建课程
      </button>

      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-sm" id="btnExport"><i data-lucide="download"></i> 导出</button>
        <button class="btn btn-secondary btn-sm" id="btnImport"><i data-lucide="upload"></i> 导入</button>
        <button class="btn btn-sm" id="btnClearData" style="background:#fce8e6;color:#b85450;"><i data-lucide="trash-2"></i> 清空</button>
        <input type="file" id="importFileInput" accept=".json" style="display:none;">
      </div>
    </aside>

    <!-- ===== 主区域 ===== -->
    <main id="main">
      <!-- 顶部导航 -->
      <nav id="topbar">
        <button class="topbar-tab active" data-tab="courses"><i data-lucide="book-marked"></i> 课程</button>
        <button class="topbar-tab" data-tab="examples"><i data-lucide="file-text"></i> 例题库</button>
        <button class="topbar-tab" data-tab="mindmap"><i data-lucide="git-graph"></i> 思维导图</button>
        <button class="topbar-tab" data-tab="latexRef"><i data-lucide="library"></i> 公式参考</button>
      </nav>

      <!-- 主内容区 -->
      <div id="content">
        <!-- 动态渲染 -->
      </div>
    </main>
  </div>

  <!-- ===== 全局弹窗容器 ===== -->
  <div id="modalContainer"></div>

  <!-- KaTeX 加载检测（仅警告，不阻塞页面） -->
  <script>
    window.addEventListener('load', function() {
      if (typeof katex === 'undefined') {
        console.warn('[StudyBoard] KaTeX 未加载，公式渲染不可用。请检查网络连接。');
      } else {
        console.log('[StudyBoard] KaTeX v' + katex.version + ' 已就绪 ✓');
      }
    });
  </script>

  <!-- Lucide 图标库 -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>
    window.addEventListener('load', function() {
      if (typeof lucide !== 'undefined') { lucide.createIcons(); }
    });
  </script>

  <!-- ===== 应用脚本 ===== -->
  <script src="js/utils.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/courses.js"></script>
  <script src="js/chapters.js"></script>
  <script src="js/concepts.js"></script>
  <script src="js/examples.js"></script>
  <script src="js/latexRef.js"></script>
  <script src="js/mindmap.js"></script>
  <script src="js/formulaBar.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
